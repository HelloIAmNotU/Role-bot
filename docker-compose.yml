services:
  bot:
    build: ./bot
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    networks:
      - app-net

  db:
    build:
      context: .
      dockerfile: Database/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - app-net

  # pgadmin:
